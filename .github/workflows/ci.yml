# CI for the ShowPilot monorepo.
#
# STEP ORDER IS CRITICAL: install → prisma generate → typecheck → test.
# The Prisma client is generated into apps/web/src/generated/prisma, which is
# gitignored (see /.gitignore: **/src/generated/). If the "Generate Prisma
# client" step is removed or moved after typechecking, `tsc --noEmit` fails
# with ~61 cascading "Cannot find module '#/generated/prisma/...'" errors that
# look like real type breakage but are just the missing generated client.

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          # Keep in sync with the pnpm version used locally (lockfile v9).
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # MUST run before any typecheck step — see the header comment.
      - name: Generate Prisma client
        run: pnpm --filter @showpilot/web db:generate

      - name: Typecheck web
        run: pnpm --filter @showpilot/web exec tsc --noEmit

      - name: Typecheck bridge
        run: pnpm --filter @showpilot/bridge exec tsc --noEmit

      - name: Test web
        run: pnpm --filter @showpilot/web test

      - name: Test bridge
        run: pnpm --filter @showpilot/bridge test
