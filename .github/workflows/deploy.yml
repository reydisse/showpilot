# Production deploy of apps/web to Cloudflare Workers (showpilot.tech).
#
# Runs only after the CI workflow completes successfully for a push to main
# (workflow_run trigger). Never deploys from pull requests or feature
# branches.
#
# D1 MIGRATIONS ARE NEVER AUTO-APPLIED. ShowPilot's migrations are
# hand-written sequential SQL files (apps/web/prisma/migrations/000N_name.sql)
# applied manually with `wrangler d1 execute showpilot-db --remote --file=…`.
# They deliberately do NOT use wrangler's migrations-directory convention, so
# `wrangler d1 migrations apply` cannot track them. Instead, the "Check D1
# migrations" step below compares the numbered SQL files against the
# applied-remote.txt manifest and FAILS the deploy with instructions if any
# file is unapplied. See DEPLOY.md → "D1 migrations" for the full procedure.
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN  — Workers deploy token (see DEPLOY.md)
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account id

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Deploy exactly the commit CI validated, not whatever main has
          # moved to since.
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Same ordering constraint as ci.yml: the generated Prisma client is
      # gitignored and the vite build imports it.
      - name: Generate Prisma client
        run: pnpm --filter @showpilot/web db:generate

      - name: Check D1 migrations (fails loudly if any are unapplied)
        run: |
          cd apps/web/prisma/migrations
          pending=()
          for f in [0-9][0-9][0-9][0-9]_*.sql; do
            grep -qxF "$f" applied-remote.txt || pending+=("$f")
          done
          if [ "${#pending[@]}" -gt 0 ]; then
            echo "::error::Unapplied D1 migration(s): ${pending[*]}"
            echo ""
            echo "The following migration files are not recorded in applied-remote.txt:"
            printf '  %s\n' "${pending[@]}"
            echo ""
            echo "Migrations are NEVER auto-applied. To unblock this deploy:"
            echo ""
            echo "  1. From apps/web, apply each file IN ORDER against production:"
            for f in "${pending[@]}"; do
              echo "       pnpm exec wrangler d1 execute showpilot-db --remote --file=prisma/migrations/$f"
            done
            echo "  2. Append each filename on its own line to"
            echo "     apps/web/prisma/migrations/applied-remote.txt"
            echo "  3. Commit and push — CI and this deploy will re-run."
            echo ""
            echo "Full procedure: DEPLOY.md → 'D1 migrations'."
            exit 1
          fi
          echo "OK: every numbered migration file is recorded as applied."

      # Runs the @showpilot/web `deploy` script: vite build && wrangler deploy
      # VITE_* values are build-time publics (repo *variables*, not secrets):
      # unset is fine — analytics no-ops and checkout degrades to hosted.
      - name: Deploy apps/web
        run: pnpm --filter @showpilot/web run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ vars.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_COMMIT_SHA: ${{ github.sha }}
